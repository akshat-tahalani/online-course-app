<!DOCTYPE html>
<html>
<head>
    <title>Online Courses</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="{% url 'onlinecourse:index' %}">Online Courses</a>
    <div>
        {% if user.is_authenticated %}
            <span class="text-white me-2">Hi, {{ user.first_name }}</span>
            <a class="btn btn-outline-light btn-sm" href="{% url 'onlinecourse:logout' %}">Logout</a>
        {% else %}
            <a class="btn btn-outline-light btn-sm" href="{% url 'onlinecourse:login' %}">Login</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'onlinecourse:registration' %}">Register</a>
        {% endif %}
    </div>
</nav>
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
</body>
</html>
